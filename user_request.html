<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Medical Request Form</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"/>

  <style>
    :root {
      --primary: #2563eb;
    }
  </style>
</head>
<body>

<main class="container">
  <h2> Medical Assistance Request</h2>

  <form>
    <label>
      Medicine Name
      <input type="text" required>
    </label>

    <label>
      Cost (₹)
      <input type="number" required>
    </label>

    <label>
      City
      <input type="text" required>
    </label>

    <label>
  Pharmacy Name
  <input type="text" placeholder="Enter pharmacy name">
    </label>

    <label>
  Google Maps Link (Pharmacy)
  <input type="url" placeholder="Paste Google Maps link">
    </label>

    <label>
  Contact (WhatsApp/Telegram)
  <input type="text" placeholder="Enter contact info">
    </label>
   
    <label>
      Upload Bill
      <input type="file">
    </label>

 <fieldset>
  <label>
    <input type="checkbox" name="urgent">
    Mark as urgent
  </label>

  <label>
    <input type="checkbox" required>
    I confirm all details are correct and valid
  </label>
</fieldset>

    <button type="submit">Submit Request</button>
  </form>
</main>

</body>
</html>

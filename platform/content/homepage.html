<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/homepage.css">
    <title>Home page</title>
</head>
<body>
    <div class="hero">
        <div class="top-section">
            <div class="logo">
                <div>
                    <p class="brand">CareBridge</p>
                    <p class="motto">Heathcare for everyone</p>
                </div>
            </div>
            <div class="message">
                <p class="commitment"><b>Our Commitment:</b> <b><u>No one</u></b>
                    should be denied treatment simply because they cannot afford it.
                </p>
                <p class="quote">“More than 1/2 the world’s
                    population still can't get essential
                    health services because they <b>cannot afford</b> it.”
                    – WHO.int </p>
            </div>
        </div>

        <div class="buttons">
            <button class="hospital">
                Be a CareBridge Partner<br>
                For Hospitals
            </button>
            <button class="donor">
                Build the Bridge<br>
                For Donors
            </button>
            <button class="patient">
                Get CareBridge Support<br>
                Register for Care
            </button>
        </div>
    </div>
</body>
</html>
